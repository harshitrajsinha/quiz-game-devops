name: CI pipeline to run basic sanity testing and create and push docker image

on:
  push:
    branches:
      - main
      - dev
    # paths:
    #   - '.github/workflows/**'
    #   - 'main.py'
    paths-exclude:
      - 'README.md'
      - 'docs/**'

permissions:
  contents: read

jobs:

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_NOTIFY_USER_LIST: '@harshitrajsinha'

      - name: Setup Python v3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Type check
        run: |
          pip install pyright
          pyright
      
      - name: Linting via Ruff
        uses: astral-sh/ruff-action@v4.0.0

  image-build-release:
    needs: [security-scan]
    runs-on: ubuntu-latest

    permissions:
      contents: read
    
    env:
      IMAGE_NAME: harshitrajsinha/quiz-game
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python v3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Docker Login
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      ## Build docker image (only)
      - name: Build and push Docker images
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: ${{env.IMAGE_NAME}}:${{env.IMAGE_TAG}}
      
      ## Scan docker image using docker scout
      - name: Docker Scout
        if: github.ref == 'refs/heads/dev'
        uses: docker/scout-action@v1.21.0
        with:
          command: cves
          image: ${{env.IMAGE_NAME}}:${{env.IMAGE_TAG}}
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sarif-file: sarif.output.json
          summary: true
      - name: Upload docker scout result Artifact
        if: always() && github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docker-scout-report
          path: sarif.output.json
      
      - name: Push image to docker registry
        run: docker push $IMAGE_NAME:$IMAGE_TAG